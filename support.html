<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>절약지도 고객센터</title>
    <style>
      :root {
        color-scheme: light;
        font-family:
          "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", system-ui,
          sans-serif;
        background: #f7f8fa;
        color: #191f28;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
        background:
          linear-gradient(
            180deg,
            rgba(18, 184, 134, 0.08),
            rgba(255, 255, 255, 0)
          ),
          #f7f8fa;
      }

      main {
        width: min(720px, 100%);
        margin: 0 auto;
      }

      .hero,
      .section {
        background: #ffffff;
        border: 1px solid #e5e8eb;
        border-radius: 8px;
      }

      .hero {
        padding: 28px 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: #12a371;
        font-size: 14px;
        font-weight: 700;
      }

      h1,
      h2,
      p {
        margin: 0;
      }

      h1 {
        font-size: 32px;
        line-height: 1.2;
      }

      .hero p {
        margin-top: 12px;
        color: #4e5968;
        line-height: 1.6;
      }

      .stack {
        display: grid;
        gap: 12px;
        margin-top: 16px;
      }

      .section {
        margin-top: 16px;
        padding: 20px 18px;
      }

      .section h2 {
        font-size: 18px;
      }

      .section p,
      .section li {
        margin-top: 10px;
        color: #4e5968;
        line-height: 1.7;
      }

      ul {
        margin: 0;
        padding-left: 20px;
      }

      a {
        color: #0f8f66;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .meta {
        margin-top: 16px;
        color: #8b95a1;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <p class="eyebrow">절약지도</p>
        <h1>고객센터</h1>
        <p>
          절약지도 서비스 이용 중 문의, 오류 제보, 제휴 요청은 아래 연락처로
          보내주세요.
        </p>
      </section>

      <section class="section">
        <h2>문의 방법</h2>
        <div class="stack">
          <p>
            이메일:
            <a href="mailto:your-email@example.com">doo_style@naver.com</a>
          </p>
          <p>응답 시간: 평일 10:00 - 18:00 (KST)</p>
        </div>
      </section>

      <section class="section">
        <h2>문의 시 함께 보내주시면 좋은 내용</h2>
        <ul>
          <li>사용 중인 기기 또는 OS 정보</li>
          <li>문제가 발생한 화면 또는 기능 설명</li>
          <li>오류 화면 캡처 또는 재현 방법</li>
        </ul>
      </section>

      <section class="section">
        <h2>서비스 안내</h2>
        <p>
          절약지도는 공공데이터를 기반으로 착한가격업소와 생활비 절약처를
          안내하는 앱인토스 미니앱입니다.
        </p>
      </section>

      <p class="meta">최종 수정일: 2026-04-30</p>
    </main>
  </body>
</html>
